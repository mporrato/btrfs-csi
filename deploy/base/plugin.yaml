---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: btrfs-csi-driver
  namespace: btrfs-csi
spec:
  selector:
    matchLabels:
      app: btrfs-csi-driver
  template:
    metadata:
      labels:
        app: btrfs-csi-driver
    spec:
      serviceAccountName: btrfs-csi-driver
      priorityClassName: system-node-critical
      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/btrfs.csi.local
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: DirectoryOrCreate
        - name: kubelet-pods-dir
          hostPath:
            path: /var/lib/kubelet/pods
            type: DirectoryOrCreate
        - name: pools-base-dir
          hostPath:
            path: /var/lib/btrfs-csi
            type: DirectoryOrCreate
      containers:
        - name: btrfs-csi-driver
          image: ghcr.io/mporrato/btrfs-csi-driver
          imagePullPolicy: IfNotPresent
          # privileged is required for mountPropagation: Bidirectional and btrfs ioctls.
          # Under privileged: true, capabilities and seccomp/AppArmor are unrestricted;
          # any capabilities.drop or seccompProfile listed here would be a no-op.
          # A compromise of this pod equals root on the node — treat it accordingly.
          securityContext:
            privileged: true
          args:
            - --endpoint=unix:///csi/csi.sock
            - --nodeid=$(NODE_NAME)
            - --kubelet-dir=/var/lib/kubelet
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: healthz
              containerPort: 9808
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 40m
              memory: 128Mi
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: kubelet-pods-dir
              mountPath: /var/lib/kubelet/pods
              mountPropagation: Bidirectional
            - name: pools-base-dir
              mountPath: /var/lib/btrfs-csi

        - name: liveness-probe
          image: registry.k8s.io/sig-storage/livenessprobe:v2.14.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          args:
            - --csi-address=/csi/csi.sock
            - --health-port=9808
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 20m
              memory: 64Mi
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.11.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          args:
            - --csi-address=/csi/csi.sock
            - --kubelet-registration-path=/var/lib/kubelet/plugins/btrfs.csi.local/csi.sock
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 20m
              memory: 64Mi
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration

        - name: external-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v4.0.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          args:
            - --csi-address=/csi/csi.sock
            - --extra-create-metadata
            - --leader-election
            - --timeout=120s
            - --enable-capacity
            - --capacity-ownerref-level=1
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 20m
              memory: 128Mi
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

        - name: external-snapshotter
          image: registry.k8s.io/sig-storage/csi-snapshotter:v8.0.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          args:
            - --csi-address=/csi/csi.sock
            - --leader-election
            - --timeout=300s
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 20m
              memory: 128Mi
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

        - name: external-resizer
          image: registry.k8s.io/sig-storage/csi-resizer:v1.14.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          args:
            - --csi-address=/csi/csi.sock
            - --leader-election
            - --timeout=120s
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 20m
              memory: 128Mi
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
