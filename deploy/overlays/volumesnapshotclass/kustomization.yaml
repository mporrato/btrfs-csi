---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Standalone VolumeSnapshotClass. Apply alongside the default overlay:
#   kubectl apply -k deploy/overlays/snapshot/  # CRDs + controller (first)
#   kubectl apply -k deploy/overlays/default/
#   kubectl apply -k deploy/overlays/volumesnapshotclass/
components:
  - ../../components/volumesnapshotclass
