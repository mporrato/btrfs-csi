---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Development overlay: full driver with all classes and secondary
# StorageClass/VolumeSnapshotClass for multi-pool e2e testing.
# Expects the snapshot overlay to be applied first.
resources:
  - ../../base
  - storageclass-secondary.yaml
  - snapshotclass-secondary.yaml
components:
  - ../../components/snapshot-driver
  - ../../components/storageclass
  - ../../components/volumesnapshotclass
images:
  - name: ghcr.io/mporrato/btrfs-csi-driver
    newName: localhost/btrfs-csi-driver
    newTag: latest
patches:
  - target:
      kind: DaemonSet
      name: btrfs-csi-driver
    patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: btrfs-csi-driver
      spec:
        template:
          spec:
            containers:
              - name: btrfs-csi-driver
                imagePullPolicy: Never
                args:
                  - --endpoint=unix:///csi/csi.sock
                  - --nodeid=$(NODE_NAME)
                  - --kubelet-dir=/var/lib/kubelet
                  - --v=4
