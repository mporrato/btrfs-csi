---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Development overlay: locally built image, verbose logging, and
# StorageClass/VolumeSnapshotClass resources for multi-pool e2e testing.
# Expects the snapshot overlay to be applied first.
resources:
  - ../../base
  - storageclass-secondary.yaml
  - snapshotclass-secondary.yaml
images:
  - name: ghcr.io/mporrato/btrfs-csi-driver
    newName: localhost/btrfs-csi-driver
    newTag: latest
patches:
  - target:
      kind: DaemonSet
      name: btrfs-csi-driver
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --v=4
