---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Development overlay: inherits minikube settings, enables verbose logging,
# and wires up the secondary btrfs pool for multi-pool testing.
resources:
  - ../minikube
  - storageclass-secondary.yaml
  - snapshotclass-secondary.yaml
images:
  - name: ghcr.io/mporrato/btrfs-csi-driver
    newName: localhost/btrfs-csi-driver
    newTag: latest
patches:
  # Use local image and enable verbose logging.
  - target:
      kind: DaemonSet
      name: btrfs-csi-driver
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --v=4
