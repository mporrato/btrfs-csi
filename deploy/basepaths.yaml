apiVersion: v1
kind: ConfigMap
metadata:
  name: btrfs-csi-pools
  namespace: btrfs-csi
data:
  # Each key is a pool name; the value is the btrfs base path.
  # StorageClass parameters.pool references the pool name.
  # With a single pool, StorageClass need not specify pool.
  # With multiple pools, omitting pool falls back to "default".
  default: /var/lib/btrfs-csi
