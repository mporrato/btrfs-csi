name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

env:
  IMAGE_NAME: ghcr.io/mporrato/btrfs-csi-driver

permissions:
  contents: read
  packages: write

jobs:
  code-checks:
    name: Code Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
      - name: go fmt
        run: |
          if ! go fmt ./...; then
            echo "go fmt failed"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go mod tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod or go.sum not tidy"
            git diff go.mod go.sum
            exit 1
          fi

  unit-test:
    name: Unit Tests
    needs: code-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Run unit tests
        run: GOTOOLCHAIN=auto go test ./...

  integration-test:
    name: Integration Tests
    needs: code-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Set up btrfs loop device
        run: |
          sudo modprobe btrfs
          dd if=/dev/zero bs=1M count=512 of=/tmp/btrfs.img
          LOOP=$(sudo losetup -f)
          sudo losetup "$LOOP" /tmp/btrfs.img
          sudo mkfs.btrfs "$LOOP"
          sudo mkdir -p /var/lib/btrfs-csi/default
          sudo mount "$LOOP" /var/lib/btrfs-csi/default
      - name: Run integration tests
        run: sudo -E GOTOOLCHAIN=auto go test -tags integration ./pkg/btrfs/

  sanity-e2e:
    name: Sanity & E2E Tests
    if: github.event_name == 'pull_request'
    needs: code-checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Install minikube
        run: |
          curl -Lo minikube https://github.com/kubernetes/minikube/releases/latest/download/minikube-linux-amd64
          chmod +x minikube
          sudo mv minikube /usr/local/bin/
      - name: Install kubectl
        uses: azure/setup-kubectl@v5
      - name: Install QEMU and UEFI firmware
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 ovmf
      - name: Start minikube cluster
        run: |
          minikube start \
            --profile=btrfs-csi \
            --driver=qemu \
            --extra-disks=2 \
            --memory=4096 \
            --cpus=4
      - name: Build driver image
        run: docker build -t localhost/btrfs-csi-driver:latest .
      - name: Set up cluster with driver
        run: CLUSTER=btrfs-csi bash scripts/minikube-up.sh
      - name: Run sanity tests
        run: CLUSTER=btrfs-csi bash scripts/sanity.sh
      - name: Run e2e tests
        run: KUBECTL="kubectl --context=btrfs-csi" bash scripts/e2e.sh

  build:
    name: Build Image
    if: github.event_name == 'push'
    needs: [unit-test, integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    name: Push Image
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
