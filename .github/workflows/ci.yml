name: CI

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  IMAGE_NAME: ghcr.io/mporrato/btrfs-csi-driver

permissions:
  contents: read
  packages: write

jobs:
  code-checks:
    name: Code Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
      - name: go fmt
        run: |
          if ! go fmt ./...; then
            echo "go fmt failed"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go mod tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod or go.sum not tidy"
            git diff go.mod go.sum
            exit 1
          fi

  unit-test:
    name: Unit Tests
    needs: code-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Run unit tests
        run: make test

  integration-test:
    name: Integration Tests
    needs: code-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Set up btrfs loop device
        run: |
          sudo modprobe btrfs
          dd if=/dev/zero bs=1M count=512 of=/tmp/btrfs.img
          LOOP=$(sudo losetup -f)
          sudo losetup "$LOOP" /tmp/btrfs.img
          sudo mkfs.btrfs "$LOOP"
          sudo mkdir -p /var/lib/btrfs-csi/default
          sudo mount "$LOOP" /var/lib/btrfs-csi/default
      - name: Run integration tests
        run: sudo -E make test-integration

  build:
    name: Build Image
    needs: [unit-test, integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute version
        id: ver
        run: echo "value=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.ver.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    name: Push Image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute version
        id: ver
        run: echo "value=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.ver.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
